services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: brand_decision_dev
    ports:
      - "5432:5432"
    volumes:
      - brand_decision_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d brand_decision_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  brand_decision_pg:
